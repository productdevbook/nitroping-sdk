name: go
on:
  push:
    paths: ['go/**', '.github/workflows/go.yml']
  pull_request:
    paths: ['go/**', '.github/workflows/go.yml']
jobs:
  test:
    strategy:
      matrix:
        go-version: ['1.22', '1.23', '1.24']
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go vet ./...
      - run: go test -race -v ./...
