name: packagist-mirror
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0           # subtree needs full history
          ssh-key: ${{ secrets.PACKAGIST_MIRROR_DEPLOY_KEY }}
          # If you'd rather use a PAT, swap to:
          # token: ${{ secrets.PACKAGIST_MIRROR_PUSH_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "nitroping-sdk-bot"
          git config user.email "bot@nitroping.dev"

      - name: Subtree split php/
        run: git subtree split --prefix=php "${GITHUB_REF}" -b _split-php

      - name: Add mirror remote
        env:
          MIRROR_REPO: productdevbook/nitroping-sdk-php
        run: |
          # ssh remote — uses the deploy key configured on the mirror repo
          git remote add mirror "git@github.com:${MIRROR_REPO}.git"

      - name: Force-push subtree main + tag to mirror
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Push the split branch as the mirror's main
          git push --force mirror _split-php:refs/heads/main
          # Push the same tag — Packagist will pick it up via the GitHub webhook
          # Tag is annotated, points to the original commit in the split branch
          # We re-create the tag on the split branch's HEAD so the SHA matches.
          MIRROR_HEAD=$(git rev-parse _split-php)
          git tag -f "$TAG" "$MIRROR_HEAD"
          git push --force mirror "$TAG"
