name: release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      # Intentionally NOT matching go/v* — Go release is just the tag itself,
      # no publish step needed. pkg.go.dev fetches on first `go get`.

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # npm — ACTIVE. Publishes via npm Trusted Publisher (OIDC); no NPM_TOKEN
  # secret required. `id-token: write` lets GitHub mint the runtime ID token
  # that `pnpm publish --provenance` exchanges with npm for a short-lived
  # publish token. The Trusted Publisher config on npmjs.com pins this repo
  # and this workflow file (`release.yml`) as the trust target.
  # ──────────────────────────────────────────────────────────────────────────
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm Trusted Publisher (OIDC)
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'
      - working-directory: js
        run: pnpm install --frozen-lockfile
      # Skip lint at release — per-PR CI gates style. Keep typecheck + tests.
      - working-directory: js
        run: pnpm typecheck
      - working-directory: js
        run: pnpm exec vitest run
      - working-directory: js
        run: pnpm build
      - working-directory: js
        run: pnpm publish --access public --no-git-checks --provenance

  # ──────────────────────────────────────────────────────────────────────────
  # PyPI — ACTIVE. Skips publish gracefully when PYPI_TOKEN is empty.
  # ──────────────────────────────────────────────────────────────────────────
  pypi:
    runs-on: ubuntu-latest
    env:
      TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
    steps:
      - name: Check PYPI_TOKEN configured
        id: check
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "::warning::PYPI_TOKEN secret is empty — skipping PyPI publish"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4
      - if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - if: steps.check.outputs.skip == 'false'
        working-directory: python
        run: pip install build twine
      - if: steps.check.outputs.skip == 'false'
        working-directory: python
        run: python -m build
      - if: steps.check.outputs.skip == 'false'
        working-directory: python
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # Maven Central (Kotlin) — skips when OSSRH_USERNAME is empty.
  # Requires multiple secrets when enabled:
  #   - OSSRH_USERNAME (Sonatype OSSRH staging account user)
  #   - OSSRH_PASSWORD
  #   - SIGNING_KEY     (ASCII-armored GPG private key)
  #   - SIGNING_KEY_ID
  #   - SIGNING_PASSWORD
  # Set up at https://central.sonatype.com to activate.
  # ──────────────────────────────────────────────────────────────────────────
  maven:
    runs-on: ubuntu-latest
    env:
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
    steps:
      - name: Check OSSRH_USERNAME configured
        id: check
        run: |
          if [ -z "$OSSRH_USERNAME" ]; then
            echo "::warning::OSSRH_USERNAME secret is empty — skipping Maven Central publish"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4
      - if: steps.check.outputs.skip == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - if: steps.check.outputs.skip == 'false'
        uses: gradle/actions/setup-gradle@v4
      - if: steps.check.outputs.skip == 'false'
        working-directory: kotlin
        run: ./gradlew :nitroping:publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

  # ──────────────────────────────────────────────────────────────────────────
  # Packagist — NO JOB NEEDED. Once the user submits the repo URL at
  # https://packagist.org/packages/submit, every tag push is auto-indexed
  # via the GitHub webhook. No secret. No CI step.
  # ──────────────────────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────────────────────
  # Go — NO JOB NEEDED. pkg.go.dev pulls from `go/v*` tags on first
  # `go get github.com/productdevbook/nitroping-sdk/go@v<ver>`. The tag push
  # we do in bump.sh creates the tag; the rest is automatic.
  # ──────────────────────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────────────────────
  # Swift Package Index — NO JOB NEEDED. SPI re-indexes nightly from any
  # public repo with a Package.swift. To list the package faster, submit at
  # https://swiftpackageindex.com/add-a-package
  # ──────────────────────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────────────────────
  # GitHub Release — always runs on tag push. Creates a release with
  # auto-generated changelog notes regardless of which registry jobs
  # succeeded or skipped.
  # ──────────────────────────────────────────────────────────────────────────
  github-release:
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for auto-changelog
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
